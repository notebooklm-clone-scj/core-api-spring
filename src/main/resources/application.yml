spring:
  # 1. PostgreSQL ?????? ?? ?? (?? ??? ?? ?? ???!)
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/notebooklm_db}
    username: ${SPRING_DATASOURCE_USERNAME:chanjin}
    password: ${SPRING_DATASOURCE_PASSWORD}

  # 2. JPA (?????? ORM) ??
  jpa:
    hibernate:
      ddl-auto: update # ?? ??? ?? DB ???? ??? ????? ??? ??
    show-sql: true # ???? ???(SELECT, INSERT ?)? ??? ???
    properties:
      hibernate:
        format_sql: true

  # 3. Redis ?? ?? ?? ??
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

jwt:
  # 이 키는 외부로 유출되면 안 됩니다! (최소 32바이트 이상 길이의 임의 문자열)
  secret: ${JWT_SECRET}
  access-expiration: 1200000 # 20분
  refresh-expiration: 604800000 # 7일


ai-worker:
  url: ${AI_WORKER_URL:http://localhost:8000}
  connect-timeout-ms: 3000
  read-timeout-ms: 180000
  chat-retry-count: 1

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}
